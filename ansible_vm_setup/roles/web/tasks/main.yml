---
# ── Role: web — Medusa Next.js Storefront + Admin on VM1 ─────────────────────

- name: Install system dependencies
  apt:
    name:
      - curl
      - ca-certificates
      - git
      - nginx
      - ufw
      - build-essential
    state: present
    update_cache: true

- name: Add NodeSource Node.js 20 repo
  shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 20
  apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install yarn globally
  npm:
    name: yarn
    global: true
    state: present

# ── Next.js Storefront ────────────────────────────────────────────────────────

- name: Create storefront directory
  file:
    path: /opt/medusa-storefront
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

- name: Copy storefront package.json
  copy:
    src: storefront/package.json
    dest: /opt/medusa-storefront/package.json
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy storefront Next.js config
  copy:
    src: storefront/next.config.js
    dest: /opt/medusa-storefront/next.config.js
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy storefront source files
  copy:
    src: storefront/src/
    dest: /opt/medusa-storefront/src/
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy storefront public directory
  copy:
    src: storefront/public/
    dest: /opt/medusa-storefront/public/
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Write storefront .env
  template:
    src: storefront-env.j2
    dest: /opt/medusa-storefront/.env.local
    owner: azureuser
    group: azureuser
    mode: '0644'
  notify: restart storefront

- name: Install storefront npm dependencies
  command: npm install --legacy-peer-deps
  args:
    chdir: /opt/medusa-storefront
  become_user: azureuser
  environment:
    HOME: /home/azureuser

- name: Build Next.js storefront
  command: npm run build
  args:
    chdir: /opt/medusa-storefront
  become_user: azureuser
  environment:
    HOME: /home/azureuser
    NEXT_PUBLIC_MEDUSA_BACKEND_URL: "http://{{ backend_host }}:9000"
    NEXT_PUBLIC_BASE_URL: "http://{{ ansible_host }}"

# ── Systemd service for storefront ───────────────────────────────────────────

- name: Install storefront systemd service
  template:
    src: medusa-storefront.service.j2
    dest: /etc/systemd/system/medusa-storefront.service
    mode: '0644'
  notify:
    - reload systemd
    - restart storefront

- name: Enable and start storefront service
  systemd:
    name: medusa-storefront
    state: started
    enabled: true
    daemon_reload: true

# ── Nginx reverse proxy ───────────────────────────────────────────────────────

- name: Install Nginx config
  template:
    src: nginx-medusa.conf.j2
    dest: /etc/nginx/sites-available/medusa
    mode: '0644'
  notify: reload nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/medusa
    dest: /etc/nginx/sites-enabled/medusa
    state: link
  notify: reload nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Validate Nginx config
  command: nginx -t
  changed_when: false

- name: Enable and start Nginx
  systemd:
    name: nginx
    state: started
    enabled: true

- name: Flush handlers
  meta: flush_handlers

# ── Firewall ──────────────────────────────────────────────────────────────────

- name: UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: UFW — allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW — allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

# ── Verify ────────────────────────────────────────────────────────────────────

- name: Wait for storefront to be ready
  uri:
    url: "http://localhost"
    status_code: 200
  register: store_check
  retries: 12
  delay: 10
  until: store_check.status == 200

- name: Deployment summary
  debug:
    msg:
      - "✔ Medusa v2 deployed successfully!"
      - "  Storefront : http://{{ ansible_host }}"
      - "  Admin      : http://{{ ansible_host }}/app"
      - "  Backend API: http://{{ backend_host }}:9000"
      - "  Admin login: {{ admin_email }} / {{ admin_password }}"
