---
# ansible_vm_setup/roles/web/tasks/main.yml
# Installs Nginx and serves a Google-style demo homepage on port 80

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Deploy Google-style demo HTML page
  copy:
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Google</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: arial, sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
          }

          /* ── Top nav ── */
          .topnav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 12px 20px;
            gap: 14px;
          }
          .topnav a {
            font-size: 13px;
            color: #202124;
            text-decoration: none;
          }
          .topnav a:hover { text-decoration: underline; }
          .topnav .signin-btn {
            background: #1a73e8;
            color: #fff;
            border-radius: 4px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
          }
          .topnav .signin-btn:hover {
            background: #1765cc;
            text-decoration: none;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
          }

          /* ── Center content ── */
          .center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px;
          }

          /* Google logo built with CSS */
          .logo {
            font-size: 72px;
            font-weight: 400;
            letter-spacing: -2px;
            margin-bottom: 28px;
            user-select: none;
          }
          .logo span:nth-child(1) { color: #4285F4; }
          .logo span:nth-child(2) { color: #EA4335; }
          .logo span:nth-child(3) { color: #FBBC05; }
          .logo span:nth-child(4) { color: #4285F4; }
          .logo span:nth-child(5) { color: #34A853; }
          .logo span:nth-child(6) { color: #EA4335; }

          /* Search box */
          .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 544px;
            margin-bottom: 24px;
          }
          .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
            font-size: 18px;
          }
          .search-box {
            width: 100%;
            padding: 13px 50px 13px 46px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 16px;
            color: #202124;
            outline: none;
            box-shadow: none;
            transition: box-shadow .2s;
          }
          .search-box:hover,
          .search-box:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
          }
          .mic-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
          }
          .mic-icon svg { display: block; }

          /* Buttons */
          .buttons {
            display: flex;
            gap: 12px;
            margin-top: 4px;
          }
          .btn {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 9px 18px;
            cursor: pointer;
            text-decoration: none;
          }
          .btn:hover {
            border-color: #dadce0;
            box-shadow: 0 1px 2px rgba(0,0,0,.1);
            color: #202124;
          }

          /* ── Footer ── */
          footer {
            background: #f2f2f2;
            border-top: 1px solid #e4e4e4;
            font-size: 13px;
            color: #70757a;
          }
          .footer-top {
            padding: 14px 24px;
            border-bottom: 1px solid #e4e4e4;
          }
          .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 12px 24px;
            flex-wrap: wrap;
            gap: 8px;
          }
          .footer-bottom a, .footer-top a {
            color: #70757a;
            text-decoration: none;
            margin-right: 18px;
          }
          .footer-bottom a:hover, .footer-top a:hover {
            text-decoration: underline;
          }

          /* Demo badge */
          .demo-badge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #1a73e8;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 12px;
            letter-spacing: .5px;
            opacity: .85;
          }
        </style>
      </head>
      <body>

        <!-- Top nav -->
        <nav class="topnav">
          <a href="#">Gmail</a>
          <a href="#">Images</a>
          <!-- Grid icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" style="cursor:pointer;color:#5f6368">
            <path fill="#5f6368" d="M6 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 20a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
          </svg>
          <a href="#" class="signin-btn">Sign in</a>
        </nav>

        <!-- Main content -->
        <main class="center">
          <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
          </div>

          <div class="search-wrapper">
            <span class="search-icon">
              <svg focusable="false" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"/>
              </svg>
            </span>
            <input class="search-box" type="text" placeholder="" aria-label="Search" />
            <span class="mic-icon">
              <svg focusable="false" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z" fill="#4285F4"/>
              </svg>
            </span>
          </div>

          <div class="buttons">
            <a class="btn" href="#">Google Search</a>
            <a class="btn" href="#">I'm Feeling Lucky</a>
          </div>
        </main>

        <!-- Footer -->
        <footer>
          <div class="footer-top">India</div>
          <div class="footer-bottom">
            <div>
              <a href="#">Advertising</a>
              <a href="#">Business</a>
              <a href="#">How Search works</a>
            </div>
            <div>
              <a href="#">Privacy</a>
              <a href="#">Terms</a>
              <a href="#">Settings</a>
            </div>
          </div>
        </footer>

        <div class="demo-badge">DEMO • Nginx on Azure</div>

      </body>
      </html>

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Write Nginx config for port 80
  copy:
    dest: /etc/nginx/sites-available/demo
    mode: "0644"
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;
          server_name _;
          root /var/www/html;
          index index.html;
          location / {
              try_files $uri $uri/ =404;
          }
      }

- name: Enable demo site
  file:
    src: /etc/nginx/sites-available/demo
    dest: /etc/nginx/sites-enabled/demo
    state: link

- name: Test Nginx config
  command: nginx -t
  changed_when: false

- name: Start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Reload Nginx to apply config
  service:
    name: nginx
    state: reloaded

- name: Verify Nginx is serving on port 80
  wait_for:
    port: 80
    host: 127.0.0.1
    timeout: 30
    state: started
