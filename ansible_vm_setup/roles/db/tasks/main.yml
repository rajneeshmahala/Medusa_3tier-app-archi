---
# ── Role: db — PostgreSQL 16 for Medusa v2 on VM3 ─────────────────────────

- name: Install prerequisites
  apt:
    name: [curl, ca-certificates, gnupg, python3-psycopg2, acl, ufw]
    state: present
    update_cache: true

- name: Add PostgreSQL apt key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL apt repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL 16
  apt:
    name: [postgresql-16, postgresql-client-16]
    state: present
    update_cache: true

- name: Start and enable PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: true

- name: Create Medusa DB user
  become_user: postgres
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    role_attr_flags: CREATEDB
    state: present

- name: Create Medusa database
  become_user: postgres
  postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
    encoding: UTF8
    state: present

- name: Grant all privileges on database
  become_user: postgres
  postgresql_privs:
    db: "{{ db_name }}"
    role: "{{ db_user }}"
    objs: ALL_IN_SCHEMA
    privs: ALL
    type: table
  ignore_errors: true

- name: Configure PostgreSQL — listen on all interfaces
  lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Allow Medusa backend (VM2) to connect via pg_hba
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host  {{ db_name }}  {{ db_user }}  10.0.0.0/16  scram-sha-256"
    insertafter: EOF
  notify: restart postgresql

- name: Tune PostgreSQL for Medusa workload
  blockinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    marker: "# {mark} MEDUSA TUNING"
    block: |
      max_connections = 100
      shared_buffers = 256MB
      work_mem = 4MB
      maintenance_work_mem = 64MB
      effective_cache_size = 768MB
      log_min_duration_statement = 1000
  notify: restart postgresql

- name: Flush handlers
  meta: flush_handlers

- name: UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: UFW — allow PostgreSQL from VNet only
  ufw:
    rule: allow
    src: "10.0.0.0/16"
    port: "5432"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

- name: Verify PostgreSQL is ready
  become_user: postgres
  postgresql_query:
    db: "{{ db_name }}"
    query: "SELECT version();"
  register: pg_ver

- name: Show PostgreSQL version
  debug:
    msg: "✔ PostgreSQL ready: {{ pg_ver.query_result[0]['version'] }}"
